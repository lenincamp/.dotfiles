after-login-command = []
after-startup-command = [
  "exec-and-forget /opt/homebrew/bin/borders active_color=0xffcba6f7 inactive_color=0xff313244 width=5.0 style=round radius=12.0 hidpi=on",
]
start-at-login = true
enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false
accordion-padding = 20
default-root-container-layout = "tiles"
default-root-container-orientation = "auto"
key-mapping.preset = "qwerty"
on-focused-monitor-changed = ["move-mouse monitor-lazy-center"]
on-focus-changed = "move-mouse window-lazy-center"

[gaps]
inner.horizontal = 5
inner.vertical = 5
outer.left = 5
outer.right = 5
outer.top = 5
outer.bottom = 5

[mode.main.binding]
cmd-h = []
cmd-alt-h = []
alt-slash = "layout tiles horizontal vertical"
alt-comma = "layout accordion horizontal vertical"
alt-h = "focus --ignore-floating --boundaries-action wrap-around-the-workspace left"
alt-j = "focus --ignore-floating --boundaries-action wrap-around-the-workspace down"
alt-k = "focus --ignore-floating --boundaries-action wrap-around-the-workspace up"
alt-l = "focus --ignore-floating --boundaries-action wrap-around-the-workspace right"
alt-esc = "mode passthrough"
alt-f = "layout floating tiling"
alt-shift-h = "move left"
alt-shift-j = "move down"
alt-shift-k = "move up"
alt-shift-l = "move right"
alt-shift-minus = "resize smart -50"
alt-shift-equal = "resize smart +50"
alt-shift-r = "mode resize"

alt-1 = "workspace --auto-back-and-forth 1"
alt-2 = "workspace --auto-back-and-forth 2"
alt-3 = "workspace --auto-back-and-forth 3"
alt-4 = "workspace --auto-back-and-forth 4"
alt-5 = "workspace --auto-back-and-forth 5"
alt-6 = "workspace --auto-back-and-forth 6"
alt-7 = "workspace --auto-back-and-forth 7"
alt-8 = "workspace --auto-back-and-forth 8"
alt-9 = "workspace --auto-back-and-forth 9"

alt-shift-1 = "move-node-to-workspace 1"
alt-shift-2 = "move-node-to-workspace 2"
alt-shift-3 = "move-node-to-workspace 3"
alt-shift-4 = "move-node-to-workspace 4"
alt-shift-5 = "move-node-to-workspace 5"
alt-shift-6 = "move-node-to-workspace 6"
alt-shift-7 = "move-node-to-workspace 7"
alt-shift-8 = "move-node-to-workspace 8"
alt-shift-9 = "move-node-to-workspace 9"

alt-tab = "workspace-back-and-forth"
alt-shift-tab = "move-workspace-to-monitor --wrap-around next"
alt-shift-semicolon = "mode service"

[mode.resize.binding]
h = "resize smart -100"
j = "resize smart +100"
k = "resize smart -100"
l = "resize smart +100"
enter = "mode main"
esc = "mode main"

[mode.passthrough.binding]
alt-esc = "mode main"

[mode.service.binding]
esc = ["reload-config", "mode main"]
r = ["flatten-workspace-tree", "mode main"]
f = ["layout floating tiling", "mode main"]
backspace = ["close-all-windows-but-current", "mode main"]
alt-shift-h = ["join-with left", "mode main"]
alt-shift-j = ["join-with down", "mode main"]
alt-shift-k = ["join-with up", "mode main"]
alt-shift-l = ["join-with right", "mode main"]
alt-shift-f = "fullscreen"

[[on-window-detected]]
if.app-id = "com.jetbrains.intellij"
run = "move-node-to-workspace 7"
[[on-window-detected]]
if.app-id = "com.jetbrains.datagrip"
run = "move-node-to-workspace 6"
[[on-window-detected]]
if.app-id = "org.jkiss.dbeaver.core.product"
run = "move-node-to-workspace 6"
[[on-window-detected]]
if.app-id = "company.thebrowser.Browser"
run = "move-node-to-workspace 5"
[[on-window-detected]]
if.app-id = "com.brave.Browser"
run = "move-node-to-workspace 5"
[[on-window-detected]]
if.app-id = "com.spotify.client"
run = "move-node-to-workspace 8"
[[on-window-detected]]
if.app-id = "com.apple.finder"
run = "layout floating"
[[on-window-detected]]
if.app-id = "com.tinyspeck.slackmacgap"
run = "layout floating"
[[on-window-detected]]
if.app-id = "net.whatsapp.WhatsApp"
run = "layout floating"
[[on-window-detected]]
if.app-id = "org.whispersystems.signal-desktop"
run = "layout floating"
[[on-window-detected]]
if.app-id = "com.apple.mail"
run = "move-node-to-workspace 4"
[[on-window-detected]]
if.app-id = "dev.warp.Warp-Stable"
run = "move-node-to-workspace 9"
[[on-window-detected]]
if.app-id = "com.googlecode.iterm2"
run = "move-node-to-workspace 9"
[[on-window-detected]]
if.app-id = "com.mitchellh.ghostty"
run = "move-node-to-workspace 9"
[[on-window-detected]]
if.app-id = "com.github.wez.wezterm"
run = "move-node-to-workspace 9"
