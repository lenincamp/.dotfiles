[general]
live_config_reload = true

[env]
WINIT_X11_SCALE_FACTOR = "1.0"
TERM = "xterm-256color"

[window]
decorations = "Buttonless"
opacity = 0.7
blur = true
startup_mode = "Maximized"
dynamic_padding = true
option_as_alt = "Both"
padding.x = 2
padding.y = 2

[font]
size = 16
normal.family = "Maple Mono NF"
normal.style = "Light"
bold.family = "Maple Mono NF"
bold.style = "SemiBold"
italic.family = "Maple Mono NF"
italic.style = "Light Italic"
bold_italic.family = "Maple Mono NF"
bold_italic.style = "SemiBold Italic"

[cursor]
style = { shape = "Block", blinking = "Off" }

[scrolling]
history = 10000

[selection]
save_to_clipboard = true

[colors.primary]
background = "#000009"
foreground = "#ffffff"
