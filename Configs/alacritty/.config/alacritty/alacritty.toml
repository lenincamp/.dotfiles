[general]
live_config_reload = true

[env]
WINIT_X11_SCALE_FACTOR = "1.0"
TERM = "xterm-256color"

[window]
decorations = "Buttonless"
opacity = 0.95
blur = true
startup_mode = "Maximized"
dynamic_padding = true
option_as_alt = "Both"
padding.x = 0
padding.y = 0

[font]
size = 17
offset.y = 4
# offset.x = -1
offset.x = 0
# offset.y = 1
normal.family = "Monoflow NF"
# normal.family = "Dank Mono NF"
# normal.family = "Consola Mono NF"
# normal.family = "Consolas NF"
# normal.family = "FiraMono Nerd Font" #installed by brew 
# normal.family = "0xProto Nerd Font"

# normal.family = "Maple Mono NF" #installed by brew | web browser
# normal.style = "ExtraLight"
# normal.family = "Monaspice Rn NF"
# normal.style = "Light"
# normal.family = "VictorMono Nerd Font"
# normal.style = "Regular"

[cursor]
style = { shape = "Block", blinking = "Off" }

[scrolling]
history = 10000

[selection]
save_to_clipboard = true

[colors.primary]
background = "#00141a"
foreground = "#839496"

